<main>
    {% case page.view %}
        {% when "topic", "nav" %}
            <article>
                <h1>{{ page.title }}</h1>
                <header>
                    {% if page.description %}
                        <p>{{ page.description }}</p>
                    {% endif %}
                </header>
                {{ content }}
            </article>
            {% include cta.html %}
        {% when "home" %}
            {{ content }}
    {% endcase %}
</main>
