<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <meta name="description" content="{{ page.description }}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ page.canonical | default: page.url | absolute_url }}">
    <link rel="alternate" hreflang="{{ page.lang | default: 'ru' }}" href="{{ page.url | absolute_url }}">
    <link rel="alternate" hreflang="x-default" href="{{ page.url | absolute_url }}">
    <meta property="og:title" content="{{ page.og_title | default: page.title }}">
    <meta property="og:description" content="{{ page.og_description | default: page.description }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ page.image | default: site.default_image }}">
    <meta property="og:image" content="https://quanta-science.github.io/preview.png">
    <meta property="og:type" content="website">
    <link rel="icon" href="{{ '/assets/img/logo.svg' | relative_url }}" type="image/svg+xml"/>
    <!--пути к assets должны быть исправлены !!!-->
    <link rel="stylesheet" href="{{ '/assets/css/pico.classless.min.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script src="script.js"></script>
    {% if page.math %}
        {% include mathjax.html %}
    {% endif %}
    {% include analytics.html %}
</head>
